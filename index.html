<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .container {
            padding: 20px;
        }
        
        .loading {
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #ff4757;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .direct-link {
            color: #ff4757;
            text-decoration: none;
            padding: 10px 20px;
            background: #333;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
        
        .direct-link:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Player de Vídeo</h1>
        <div class="loading">
            <p>Redirecionando para o player nativo...</p>
            <div class="spinner"></div>
        </div>
        <p>Se não for redirecionado automaticamente:</p>
        <a href="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" 
           class="direct-link" 
           target="_blank">
            📺 Clique aqui para abrir o vídeo
        </a>
    </div>

    <script>
        // Redireciona automaticamente após 2 segundos
        setTimeout(function() {
            window.location.href = "https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4";
        }, 2000);
    </script>
</body>
</html>
