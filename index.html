<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Video Player</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
        }
        
        .player-wrapper {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        h1 {
            color: #4CAF50;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .info {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            text-align: center;
            word-break: break-all;
        }
        
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .download-btn:hover {
            background: #45a049;
        }
        
        .status {
            color: #4CAF50;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-wrapper">
            <h1>📹 Telegram Video Player</h1>
            
            <video id="videoPlayer" controls preload="auto">
                <source src="/api/video?file_id=BAACAgEAAxkBAAMGaZnkR4Dvk4TUAAEhRCLZT4Q0dH0xAALuBQACF83QRAR7In6WfoMOOgQ" type="video/mp4">
            </video>
            
            <div style="text-align: center;">
                <a href="/api/video?file_id=BAACAgEAAxkBAAMGaZnkR4Dvk4TUAAEhRCLZT4Q0dH0xAALuBQACF83QRAR7In6WfoMOOgQ&download=1" 
                   class="download-btn">
                    ⬇️ Baixar Vídeo
                </a>
            </div>
            
            <div class="info" id="status">
                Carregando vídeo...
            </div>
            
            <div class="info">
                <strong>File ID:</strong><br>
                <code style="color: #ff9800;">BAACAgEAAxkBAAMGaZnkR4Dvk4TUAAEhRCLZT4Q0dH0xAALuBQACF83QRAR7In6WfoMOOgQ</code>
            </div>
        </div>
    </div>
    
    <script>
        const video = document.getElementById('videoPlayer');
        const status = document.getElementById('status');
        
        video.addEventListener('loadedmetadata', () => {
            status.innerHTML = `✅ Vídeo carregado - ${video.videoWidth}x${video.videoHeight} | ${Math.round(video.duration)}s`;
            status.style.color = '#4CAF50';
        });
        
        video.addEventListener('error', () => {
            status.innerHTML = '❌ Erro ao carregar vídeo';
            status.style.color = '#ff6b6b';
        });
        
        video.addEventListener('waiting', () => {
            status.innerHTML = '⏳ Bufferizando...';
            status.style.color = '#ff9800';
        });
        
        video.addEventListener('canplay', () => {
            status.innerHTML = '▶️ Pronto para reproduzir';
            status.style.color = '#4CAF50';
        });
    </script>
</body>
</html>
