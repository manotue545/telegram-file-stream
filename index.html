<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Vídeo - Telegram</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .info {
            margin-top: 15px;
            color: white;
            text-align: center;
            font-size: 14px;
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎬 Player de Vídeo - Telegram</h1>
        
        <video controls autoplay muted>
            <source src="https://api.telegram.org/file/bot8274275591:AAHDIz1Z7dpGQDesNQBES3Q7FoA_vxhG1eQ/videos/file_1.mp4" type="video/mp4">
            Seu navegador não suporta a tag de vídeo.
        </video>
        
        <div class="info">
            <p><strong>URL do vídeo:</strong></p>
            <p>https://api.telegram.org/file/bot8274275591:AAHDIz1Z7dpGQDesNQBES3Q7FoA_vxhG1eQ/videos/file_1.mp4</p>
            <a href="https://api.telegram.org/file/bot8274275591:AAHDIz1Z7dpGQDesNQBES3Q7FoA_vxhG1eQ/videos/file_1.mp4" 
               class="download-btn" 
               download="video_telegram.mp4">
                ⬇️ Baixar Vídeo
            </a>
        </div>
    </div>
</body>
</html>
