<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Vídeo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }
        
        video {
            width: 100%;
            border-radius: 8px;
        }
        
        .error-message {
            color: white;
            text-align: center;
            padding: 20px;
            background: #333;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .direct-link {
            color: #ff4757;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <video controls autoplay playsinline id="player">
            <source src="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" type="video/mp4">
            <source src="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" type="video/mp4">
            Seu navegador não suporta a tag de vídeo.
        </video>
        
        <div class="error-message" id="errorMsg" style="display: none;">
            <p>❌ Não foi possível carregar o vídeo automaticamente.</p>
            <p>Clique no link abaixo para assistir diretamente:</p>
            <a href="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" 
               class="direct-link" 
               target="_blank">
                📺 Abrir vídeo diretamente
            </a>
        </div>
    </div>

    <script>
        const video = document.getElementById('player');
        const errorMsg = document.getElementById('errorMsg');
        
        video.addEventListener('error', function() {
            errorMsg.style.display = 'block';
        });
        
        // Timeout de 5 segundos para carregamento
        setTimeout(function() {
            if(video.readyState === 0) {
                errorMsg.style.display = 'block';
            }
        }, 5000);
    </script>
</body>
</html>
