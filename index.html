<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Vídeo HD - Lightspeed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0f0c1f 0%, #1a1b2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-wrapper {
            max-width: 1000px;
            width: 100%;
            background: rgba(10, 8, 20, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            color: white;
            flex-wrap: wrap;
            gap: 15px;
        }

        .video-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .video-title h1 {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #b8b9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 71, 87, 0.3);
            backdrop-filter: blur(4px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            background: #000;
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }

        /* Custom video controls styling */
        video::-webkit-media-controls-panel {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        video::-webkit-media-controls-play-button {
            background-color: #ff4757;
            border-radius: 50%;
        }

        video::-webkit-media-controls-timeline {
            border-radius: 30px;
            padding: 0 5px;
        }

        .info-panel {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .url-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .url-label {
            color: #a0a0c0;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .url-label i {
            color: #ff4757;
            font-style: normal;
            font-size: 18px;
        }

        .url-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 18px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            color: #b8b9ff;
            word-break: break-all;
            line-height: 1.5;
            backdrop-filter: blur(4px);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            flex: 1 1 auto;
            min-width: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .video-meta {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            color: #a0a0c0;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item span {
            color: #fff;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .player-wrapper {
                padding: 15px;
            }
            
            .video-title h1 {
                font-size: 20px;
            }
            
            .btn {
                min-width: 100%;
            }
            
            .url-box {
                font-size: 12px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <div class="video-header">
            <div class="video-title">
                <h1>🎬 Ao no Miburo - Episódio 1</h1>
                <div class="badge">480p</div>
            </div>
            <div class="badge" style="background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: rgba(52, 152, 219, 0.3);">
                ⚡ Lightspeed Stream
            </div>
        </div>

        <div class="video-container">
            <video controls autoplay muted playsinline>
                <source src="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" type="video/mp4">
                <source src="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" type="video/mp4">
                Seu navegador não suporta a tag de vídeo. Por favor, atualize para um navegador mais recente.
            </video>
        </div>

        <div class="info-panel">
            <div class="url-section">
                <div class="url-label">
                    <i>🔗</i> URL DO VÍDEO
                </div>
                <div class="url-box">
                    https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4
                </div>
            </div>

            <div class="action-buttons">
                <a href="https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4" 
                   class="btn btn-primary" 
                   download="ao-no-miburo-ep1-480p.mp4">
                    ⬇️ Baixar Vídeo (480p)
                </a>
                <button class="btn btn-secondary" onclick="copyToClipboard()">
                    📋 Copiar URL
                </button>
            </div>

            <div class="video-meta">
                <div class="meta-item">
                    <span>📺</span> Qualidade: <span>480p</span>
                </div>
                <div class="meta-item">
                    <span>🎞️</span> Formato: <span>MP4</span>
                </div>
                <div class="meta-item">
                    <span>📦</span> Tamanho: <span>~120 MB</span>
                </div>
                <div class="meta-item">
                    <span>⚡</span> Servidor: <span>Lightspeed</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyToClipboard() {
            const url = "https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4";
            
            // Usando a Clipboard API moderna
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function() {
                    showToast("URL copiada para a área de transferência! 📋");
                }).catch(function(err) {
                    console.error('Erro ao copiar: ', err);
                    fallbackCopy();
                });
            } else {
                fallbackCopy();
            }
        }

        function fallbackCopy() {
            const textarea = document.createElement('textarea');
            textarea.value = "https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4";
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                showToast("URL copiada para a área de transferência! 📋");
            } catch (err) {
                console.error('Erro no fallback: ', err);
                showToast("Erro ao copiar. Selecione manualmente.", true);
            }
            
            document.body.removeChild(textarea);
        }

        function showToast(message, isError = false) {
            // Criar elemento toast
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#ff4757' : '#2ecc71'};
                color: white;
                padding: 12px 28px;
                border-radius: 50px;
                font-size: 14px;
                font-weight: 600;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideUp 0.3s ease;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.2);
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 2000);
        }

        // Adicionar keyframe animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translate(-50%, 20px);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
            }
            
            @keyframes fadeOut {
                from {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
                to {
                    opacity: 0;
                    transform: translate(-50%, 20px);
                }
            }
        `;
        document.head.appendChild(style);

        // Log de informações do vídeo
        console.log('🎬 Player de Vídeo Inicializado');
        console.log('📹 URL:', 'https://lightspeedst.net/s2/mp4_temp/ao-no-miburo-serizawa-ansatsu-hen/1/480p.mp4');
        console.log('⚡ Servidor: Lightspeed');
        
        // Detectar quando o vídeo começa a carregar
        const video = document.querySelector('video');
        video.addEventListener('loadstart', () => {
            console.log('🔄 Carregando vídeo...');
        });
        
        video.addEventListener('loadeddata', () => {
            console.log('✅ Vídeo carregado com sucesso!');
        });
        
        video.addEventListener('error', (e) => {
            console.error('❌ Erro ao carregar vídeo:', e);
            showToast('Erro ao carregar o vídeo. Verifique a URL.', true);
        });
    </script>
</body>
</html>
